<header id="header">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Faixa superior com título, descrição e botão hamburguer -->


 <div style="
  background-image: url('imagens/CeMEPI2.svg');
  background-size: 50%;
  background-position: center;
  background-repeat: no-repeat;
  color: #fff;
  padding: 10vw;
  text-align: center;
  position: relative;"> 

<!-- Botão Hamburguer (só aparece em telas pequenas) -->
    <i class="bi bi-list mobile-nav-toggle" style="position: absolute; top: 20px; left: 20px; font-size: 2rem; color: #fff; cursor: pointer;"></i>

</div>


  <!-- Faixa das logos com um fundo sofisticado -->
   <div class="barra">
  <div class="container-logos">
    
    <a href="https://www.portal.pge.sp.gov.br/site-pge/" target="_blank" class="logo-btn">
      <img src="imagens/logo-pge-branca.png" alt="Logo PGE">
    </a>

    <a href="https://www5.usp.br/" target="_blank" class="logo-btn">
      <img src="imagens/logo-usp.png" alt="Logo USP">
    </a>


    <a href="https://www.fapesp.br/" target="_blank" class="logo-btn">
      <img src="imagens/logo-fapesp.png" alt="Logo FAPESP">
    </a>

    <a href="https://www.fearp.usp.br/" target="_blank" class="logo-btn">
      <img src="imagens/logo-fearp.png" alt="Logo FEA-RP">
    </a>
   
    <a href="https://devhabeasdata.fearp.usp.br/" target="_blank" class="logo-btn">
      <img src="imagens/logo-hd.png" alt="Logo HD">
    </a>

  <style>
    /* Estilo para esconder/mostrar o menu no mobile */
    .barra {
  /*background: #186d7f;*/
  /*padding: 5px 0;*/
}

.container-logos {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  gap: 10vw;
  max-width: 90%;
  margin: 0 auto;
}

.logo-btn img {
  max-width: 5vw;
  transition: all 0.3s ease;
}

/* ✨ Efeito hover */
.logo-btn:hover img {
  transform: scale(1.2);        /* aumenta o tamanho */
  filter: brightness(1.2);      /* deixa mais claro */
}

/* 💡 efeito extra opcional */
.logo-btn:hover {
  transform: translateY(-5px);  /* sobe levemente */
}
        @media (max-width: 992px) {
          #sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background-color: #f5f5f5;
            z-index: 2000;
            overflow-y: auto;
            transition: left 0.3s ease-in-out;
          }
        
          #sidebar.navbar-mobile {
            left: 0;
          }
        
          .mobile-nav-toggle {
            display: block;
          }
        }
        
        @media (min-width: 993px) {
          .mobile-nav-toggle {
            display: none;
          }
        }
  </style>
</header>
