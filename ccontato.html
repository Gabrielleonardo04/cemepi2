        .contact-form form {

            gap: 15px;
        }
        .contact-form input,

            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;

            text-align: left;

        }
        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: #154c56;
            box-shadow: 0 3px 8px rgba(0, 51, 102, 0.3);
        }
        .contact-form button {

            color: #fff;

            font-size: 1.1em;
            cursor: pointer;

            margin: auto;

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const select = (el, all = false) => {
      el = el.trim();
      return all ? [...document.querySelectorAll(el)] : document.querySelector(el);
    };

    const on = (type, el, listener, all = false) => {
      const element = select(el, all);
      if (element) {
        if (all) element.forEach(e => e.addEventListener(type, listener));
        else element.addEventListener(type, listener);
      }
    };

    on('click', '.mobile-nav-toggle', function () {
      const sidebar = select('#sidebar');
      if (sidebar) {
        sidebar.classList.toggle('navbar-mobile');
        this.classList.toggle('bi-list');
        this.classList.toggle('bi-x');
        console.log('menu toggled');
      } else {
        console.warn('Sidebar não encontrado');
      }
    });
  });
</script>

<script>
  // Carrega o header dinamicamente
fetch('cheader.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('header').innerHTML = data;

    // Espera o conteúdo ser injetado e então registra o evento no botão
    const toggleBtn = document.querySelector('.mobile-nav-toggle');
    const sidebar = document.getElementById('sidebar');

    if (toggleBtn && sidebar) {
      // Alterna o menu ao clicar no botão
      toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('navbar-mobile');
        toggleBtn.classList.toggle('bi-list');
        toggleBtn.classList.toggle('bi-x');
        console.log('menu toggled');
      });

      // Fecha o menu ao clicar fora da sidebar e fora do botão
      document.addEventListener('click', (e) => {
        const clickedInsideSidebar = sidebar.contains(e.target);
        const clickedToggleBtn = toggleBtn.contains(e.target);
        const isMobile = window.innerWidth <= 992;

        if (
          isMobile &&
          sidebar.classList.contains('navbar-mobile') &&
          !clickedInsideSidebar &&
          !clickedToggleBtn
        ) {
          sidebar.classList.remove('navbar-mobile');
          toggleBtn.classList.add('bi-list');
          toggleBtn.classList.remove('bi-x');
          console.log('menu fechado por clique fora');
        }
      });
    } else {
      console.warn('Botão ou sidebar não encontrado');
    }
  })
  .catch(error => {
    console.error('Erro ao carregar o header:', error);
  });

</script>
